<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index.html</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-text: #085041;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --bg: #f5f3ee;
    --card: #ffffff;
    --text: #1a1a18;
    --muted: #6b6b67;
    --border: rgba(0,0,0,0.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(circle at 20% 20%, rgba(29,158,117,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(29,158,117,0.05) 0%, transparent 50%);
  }

  .container { width: 100%; max-width: 460px; }

  .header { text-align: center; margin-bottom: 2rem; }

  .court-icon {
    width: 56px; height: 56px;
    background: var(--green);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    font-size: 26px;
    box-shadow: 0 4px 16px rgba(29,158,117,0.3);
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px; color: var(--text);
    margin-bottom: 6px;
    animation: fadeUp 0.4s 0.1s ease both;
  }

  .header p { font-size: 14px; color: var(--muted); animation: fadeUp 0.4s 0.2s ease both; }

  @keyframes fadeUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 2rem;
    border: 0.5px solid var(--border);
    box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    animation: fadeUp 0.4s 0.15s ease both;
  }

  .field { margin-bottom: 1.25rem; }

  .field label {
    display: block; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin-bottom: 8px;
  }

  .field input[type="text"] {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    color: var(--text); background: #fafaf8; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  .field input[type="text"]:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
    background: #fff;
  }

  .field input[type="text"]::placeholder { color: #bbb; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  .question-label { display: block; font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 10px; }

  .yn-group, .nivel-group { display: flex; gap: 10px; }

  .yn-btn, .nivel-btn {
    flex: 1; padding: 11px 8px;
    border: 1px solid var(--border); border-radius: 10px;
    background: #fafaf8; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .yn-btn:hover, .nivel-btn:hover { background: #f0f0eb; border-color: rgba(0,0,0,0.2); }
  .yn-btn.selected-si { background: var(--green-light); border-color: var(--green); color: var(--green-dark); box-shadow: 0 0 0 2px rgba(29,158,117,0.15); }
  .yn-btn.selected-no { background: var(--red-light); border-color: var(--red); color: var(--red); box-shadow: 0 0 0 2px rgba(163,45,45,0.1); }
  .nivel-btn.selected-alto { background: #FAECE7; border-color: #993C1D; color: #993C1D; box-shadow: 0 0 0 2px rgba(153,60,29,0.1); }
  .nivel-btn.selected-medio { background: var(--amber-light); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 0 2px rgba(133,79,11,0.1); }
  .nivel-btn.selected-bajo { background: var(--blue-light); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 0 2px rgba(24,95,165,0.1); }

  .submit-btn {
    width: 100%; padding: 13px;
    background: var(--green); border: none; border-radius: 10px;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 0.75rem;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(29,158,117,0.3);
  }

  .submit-btn:hover:not(:disabled) { background: var(--green-dark); box-shadow: 0 6px 18px rgba(29,158,117,0.35); }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:disabled { background: #d0cec8; box-shadow: none; cursor: not-allowed; }

  .submit-btn.loading { opacity: 0.8; cursor: not-allowed; }

  #success-view { display: none; text-align: center; }

  .success-icon {
    width: 64px; height: 64px;
    background: var(--green-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem; font-size: 30px;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .success-view h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 6px; }
  .success-view p { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }

  .resumen {
    background: #fafaf8; border-radius: 12px;
    padding: 1rem; text-align: left;
    font-size: 14px; border: 1px solid var(--border);
  }

  .resumen-row { display: flex; justify-content: space-between; padding: 6px 0; }
  .resumen-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .resumen-row span:first-child { color: var(--muted); }
  .resumen-row span:last-child { font-weight: 500; color: var(--text); }

  .reset-btn {
    margin-top: 1.25rem; padding: 10px 24px;
    border: 1px solid var(--border); border-radius: 10px;
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }

  .reset-btn:hover { background: #f0f0eb; color: var(--text); }

  .error-msg {
    font-size: 13px; color: var(--red);
    text-align: center; margin-top: 8px; display: none;
  }

  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="court-icon">🎾</div>
    <h1>Inscripción al Pádel</h1>
    <p>Completá tus datos para anotarte</p>
  </div>

  <div class="card">
    <div id="form-view">
      <div class="row">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" />
        </div>
        <div class="field">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Tu apellido" />
        </div>
      </div>

      <hr class="divider">

      <div class="field">
        <span class="question-label">¿Te anoto en el pádel?</span>
        <div class="yn-group">
          <button class="yn-btn" id="btn-si" onclick="selectYN('si')">✓ Sí</button>
          <button class="yn-btn" id="btn-no" onclick="selectYN('no')">✗ No</button>
        </div>
      </div>

      <div class="field">
        <span class="question-label">¿Tu nivel?</span>
        <div class="nivel-group">
          <button class="nivel-btn" id="btn-alto" onclick="selectNivel('alto')">🔥 Alto</button>
          <button class="nivel-btn" id="btn-medio" onclick="selectNivel('medio')">⚡ Medio</button>
          <button class="nivel-btn" id="btn-bajo" onclick="selectNivel('bajo')">🌱 Bajo</button>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()" disabled>Confirmar inscripción</button>
      <p class="error-msg" id="error-msg">Hubo un error al guardar. Intentá de nuevo.</p>
    </div>

    <div id="success-view" class="success-view">
      <div class="success-icon">✓</div>
      <h2>¡Listo, <span id="nombre-out"></span>!</h2>
      <p>Tu inscripción fue registrada correctamente.</p>
      <div class="resumen">
        <div class="resumen-row">
          <span>Nombre completo</span>
          <span id="res-nombre"></span>
        </div>
        <div class="resumen-row">
          <span>Anotado</span>
          <span id="res-yn"></span>
        </div>
        <div class="resumen-row">
          <span>Nivel</span>
          <span id="res-nivel"></span>
        </div>
      </div>
      <button class="reset-btn" onclick="resetForm()">Nueva inscripción</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/a/macros/mercadolibre.com/s/AKfycbwysklC2nQPdR_C_ithh10qDNjOkjch7ni_BVZYmjJH2ny8j65ArVb-CdyE0jmaMnwg/exec';

  let ynVal = null, nivelVal = null;

  function selectYN(val) {
    ynVal = val;
    document.getElementById('btn-si').className = 'yn-btn' + (val === 'si' ? ' selected-si' : '');
    document.getElementById('btn-no').className = 'yn-btn' + (val === 'no' ? ' selected-no' : '');
    checkReady();
  }

  function selectNivel(val) {
    nivelVal = val;
    ['alto','medio','bajo'].forEach(n => {
      document.getElementById('btn-' + n).className = 'nivel-btn' + (val === n ? ' selected-' + n : '');
    });
    checkReady();
  }

  function checkReady() {
    const nombre = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    document.getElementById('submit-btn').disabled = !(nombre && apellido && ynVal && nivelVal);
  }

  document.getElementById('nombre').addEventListener('input', checkReady);
  document.getElementById('apellido').addEventListener('input', checkReady);

  function submitForm() {
    const nombre = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const btn = document.getElementById('submit-btn');
    const errMsg = document.getElementById('error-msg');

    btn.textContent = 'Guardando...';
    btn.classList.add('loading');
    btn.disabled = true;
    errMsg.style.display = 'none';

    const payload = {
      nombre: nombre,
      apellido: apellido,
      anotado: ynVal === 'si' ? 'Sí' : 'No',
      nivel: nivelVal.charAt(0).toUpperCase() + nivelVal.slice(1)
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(() => {
      document.getElementById('nombre-out').textContent = nombre;
      document.getElementById('res-nombre').textContent = nombre + ' ' + apellido;
      document.getElementById('res-yn').textContent = ynVal === 'si' ? 'Sí ✓' : 'No ✗';
      document.getElementById('res-yn').style.color = ynVal === 'si' ? '#0F6E56' : '#A32D2D';
      const nivelMap = { alto: '🔥 Alto', medio: '⚡ Medio', bajo: '🌱 Bajo' };
      document.getElementById('res-nivel').textContent = nivelMap[nivelVal];
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    })
    .catch(() => {
      btn.textContent = 'Confirmar inscripción';
      btn.classList.remove('loading');
      btn.disabled = false;
      errMsg.style.display = 'block';
    });
  }

  function resetForm() {
    ynVal = null; nivelVal = null;
    document.getElementById('nombre').value = '';
    document.getElementById('apellido').value = '';
    ['btn-si','btn-no'].forEach(id => document.getElementById(id).className = 'yn-btn');
    ['btn-alto','btn-medio','btn-bajo'].forEach(id => document.getElementById(id).className = 'nivel-btn');
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = 'Confirmar inscripción';
    document.getElementById('success-view').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
  }
</script>
</body>
</html>
